<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHMAD MINI — Pair Code</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #000;
  --surface: #0a0a0a;
  --border: #1a1a1a;
  --white: #ffffff;
  --dim: #666;
  --error: #ff4444;
  --success: #00ff88;
}

@keyframes rgb-spin {
  0%   { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

@keyframes rgb-text {
  0%   { background-position: 0%; }
  100% { background-position: 400%; }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 8px rgba(255,255,255,0.05); }
  50%       { box-shadow: 0 0 20px rgba(255,255,255,0.12); }
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--black);
  font-family: 'Space Grotesk', sans-serif;
  color: var(--white);
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 28px;
  text-align: center;
  animation: fadeUp 0.4s ease both;
}

/* ── RGB border wrapper ── */
.rgb-wrap {
  padding: 2px;
  border-radius: 14px;
  background: linear-gradient(90deg, #f00, #ff8000, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
  background-size: 300% 100%;
  animation: rgb-spin 3s linear infinite;
  margin-bottom: 14px;
}

.rgb-inner {
  background: var(--black);
  border-radius: 12px;
  width: 100%;
}

/* ── Logo ── */
.logo-wrap {
  margin-bottom: 28px;
}

.crown {
  font-size: 2rem;
  display: block;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 12px rgba(255,200,0,0.5));
}

h1 {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #f00, #ff8000, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
  background-size: 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rgb-text 6s linear infinite;
  line-height: 1;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 0.7rem;
  letter-spacing: 4px;
  color: var(--dim);
  font-family: 'IBM Plex Mono', monospace;
  text-transform: uppercase;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* ── Label ── */
.label {
  font-size: 0.65rem;
  letter-spacing: 3px;
  color: var(--dim);
  font-family: 'IBM Plex Mono', monospace;
  text-transform: uppercase;
  text-align: left;
  margin-bottom: 8px;
  display: block;
}

/* ── Input ── */
input {
  width: 100%;
  border: none;
  outline: none;
  padding: 14px 16px;
  border-radius: 12px;
  background: var(--black);
  color: var(--white);
  font-size: 1rem;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  text-align: center;
  letter-spacing: 1px;
}

input::placeholder {
  color: #333;
  font-weight: 400;
  letter-spacing: 0;
}

/* ── Button ── */
.btn-wrap {
  padding: 2px;
  border-radius: 14px;
  background: linear-gradient(90deg, #f00, #ff8000, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
  background-size: 300% 100%;
  animation: rgb-spin 3s linear infinite;
  margin-bottom: 20px;
  cursor: pointer;
}

.btn-inner {
  background: var(--black);
  border-radius: 12px;
  padding: 14px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--white);
  text-transform: uppercase;
  transition: background 0.2s;
  border: none;
  width: 100%;
  cursor: pointer;
}

.btn-inner:hover { background: #111; }
.btn-inner:active { background: #0a0a0a; }

/* ── Result Box ── */
.result-wrap {
  display: none;
  animation: fadeUp 0.3s ease both;
}

.result-wrap.visible { display: block; }

.result-box {
  padding: 2px;
  border-radius: 14px;
  background: linear-gradient(90deg, #f00, #ff8000, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
  background-size: 300% 100%;
  animation: rgb-spin 3s linear infinite, pulse-glow 2s ease-in-out infinite;
  margin-bottom: 10px;
}

.result-inner {
  background: var(--black);
  border-radius: 12px;
  padding: 18px 14px;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

#codeText {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 6px;
  color: var(--white);
  cursor: pointer;
  transition: color 0.2s;
}

#codeText.error { color: var(--error); letter-spacing: 1px; font-size: 0.85rem; }
#codeText.success-flash { color: var(--success); }

.copy-hint {
  font-size: 0.6rem;
  color: var(--dim);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 2px;
}

/* ── Loader ── */
.loader {
  width: 22px;
  height: 22px;
  border: 2px solid #222;
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}

/* ── Footer ── */
footer {
  margin-top: 24px;
  font-size: 0.6rem;
  letter-spacing: 2px;
  color: #333;
  font-family: 'IBM Plex Mono', monospace;
  text-transform: uppercase;
}

</style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <span class="crown">👑</span>
    <h1>AHMAD MINI</h1>
    <p class="subtitle">WhatsApp Bot · 2026</p>
  </div>

  <div class="divider"></div>

  <!-- Input -->
  <span class="label">Your WhatsApp Number</span>
  <div class="rgb-wrap">
    <div class="rgb-inner">
      <input type="tel" id="number" placeholder="923237045919" inputmode="numeric">
    </div>
  </div>

  <!-- Button -->
  <div class="btn-wrap">
    <button class="btn-inner" onclick="getCode()">Get Pair Code</button>
  </div>

  <!-- Result -->
  <div class="result-wrap" id="resultWrap">
    <span class="label">Your Code</span>
    <div class="result-box" onclick="copyCode()">
      <div class="result-inner">
        <div class="loader" id="loader" style="display:none;"></div>
        <span id="codeText">----</span>
      </div>
    </div>
    <p class="copy-hint" id="copyHint">TAP TO COPY</p>
  </div>

  <div class="divider"></div>

  <footer>Made by Ahmad Mini &nbsp;·&nbsp; © 2026</footer>

</div>

<script>
let lastCode = '';

async function getCode() {
  const num = document.getElementById('number').value.replace(/[^0-9]/g, '');
  const resultWrap = document.getElementById('resultWrap');
  const codeText   = document.getElementById('codeText');
  const loader     = document.getElementById('loader');
  const copyHint   = document.getElementById('copyHint');

  if (!num) {
    resultWrap.classList.add('visible');
    codeText.className = 'error';
    codeText.innerText = 'Enter your number first';
    loader.style.display = 'none';
    copyHint.style.display = 'none';
    return;
  }

  // Loading
  resultWrap.classList.add('visible');
  loader.style.display = 'block';
  codeText.className = '';
  codeText.innerText = '';
  copyHint.style.display = 'none';

  try {
    const res  = await fetch(`/code?number=${num}`);
    const data = await res.json();

    loader.style.display = 'none';

    if (data.code) {
      lastCode = data.code;
      codeText.className = '';
      codeText.innerText = data.code;
      copyHint.style.display = 'block';
    } else {
      codeText.className = 'error';
      codeText.innerText = data.message || 'Server error — try again';
      copyHint.style.display = 'none';
    }
  } catch (e) {
    loader.style.display = 'none';
    codeText.className = 'error';
    codeText.innerText = 'Connection failed';
    copyHint.style.display = 'none';
  }
}

function copyCode() {
  if (!lastCode) return;
  navigator.clipboard.writeText(lastCode).then(() => {
    const codeText  = document.getElementById('codeText');
    const copyHint  = document.getElementById('copyHint');
    const prev = codeText.innerText;
    codeText.className = 'success-flash';
    codeText.innerText = 'COPIED!';
    copyHint.innerText = '✓ DONE';
    setTimeout(() => {
      codeText.className = '';
      codeText.innerText = prev;
      copyHint.innerText = 'TAP TO COPY';
    }, 1500);
  });
}

document.getElementById('number').addEventListener('keydown', e => {
  if (e.key === 'Enter') getCode();
});
</script>

</body>
</html>
